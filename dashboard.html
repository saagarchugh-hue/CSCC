<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merchant Success Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef1f6;
      --surface: #ffffff;
      --surface-hover: #e8edf5;
      --border: #cfd8e3;
      --text: #15202b;
      --text-muted: #5a6b7d;
      --accent: #2563eb;
      --accent-dim: #1d4ed8;
      --on-accent: #ffffff;
      --critical: #c62828;
      --high: #b45309;
      --medium: #047857;
      --low: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stats {
      display: flex;
      gap: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .stats span { font-weight: 500; color: var(--text); }
    .toolbar {
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .filters label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 0.25rem;
    }
    .filters select {
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
    }
    .table-wrap {
      overflow-x: auto;
      padding: 1rem 1.5rem;
      background: var(--surface);
      margin: 0 1.5rem 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th .sort-icon {
      opacity: 0.5;
      margin-left: 0.25rem;
    }
    th.sorted-asc .sort-icon::after { content: '↑'; opacity: 1; }
    th.sorted-desc .sort-icon::after { content: '↓'; opacity: 1; }
    td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--surface-hover); }
    tbody tr:nth-child(even) td { background: rgba(248, 250, 252, 0.65); }
    tbody tr:nth-child(even):hover td { background: var(--surface-hover); }
    tr[data-tier="0"] td:first-child { box-shadow: inset 4px 0 0 #7c3aed; }
    tr[data-tier="1"] td:first-child { box-shadow: inset 4px 0 0 #2563eb; }
    tr[data-tier="2"] td:first-child { box-shadow: inset 4px 0 0 #0891b2; }
    tr[data-tier=""] td:first-child { box-shadow: none; }
    .tier-pill {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tier-pill.tier-0 { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
    .tier-pill.tier-1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .tier-pill.tier-2 { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
    .tier-pill.tier-unknown { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    .priority-pill {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .priority-pill.priority-Critical { background: #fee2e2; color: #991b1b; }
    .priority-pill.priority-High { background: #ffedd5; color: #9a3412; }
    .priority-pill.priority-Medium { background: #d1fae5; color: #065f46; }
    .priority-pill.priority-Low { background: #f1f5f9; color: #475569; }
    .leadership-yes { color: var(--accent); font-weight: 600; }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-action {
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--accent);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-action:hover { background: var(--surface-hover); border-color: var(--accent); }
    .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-action.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent-dim); }
    .btn-action.primary:hover { background: var(--accent-dim); }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.12);
      max-width: 560px; width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
    }
    .text-muted { color: var(--text-muted); }
    .modal-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { margin: 0; font-size: 1rem; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0.25rem; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1.25rem; overflow-y: auto; font-size: 0.9rem; }
    .modal-body.loading { color: var(--text-muted); }
    .email-body { white-space: pre-wrap; margin: 0 0 1rem; }
    .btn-copy { padding: 0.4rem 0.75rem; background: var(--accent); color: var(--on-accent); border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .btn-copy:hover { filter: brightness(1.1); }
    .news-list { list-style: none; margin: 0; padding: 0; }
    .news-list li { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .news-list li:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: 0; }
    .news-list a { color: var(--accent); text-decoration: none; }
    .news-list a:hover { text-decoration: underline; }
    .news-list .source { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    .news-summary { margin: 0 0 1rem; padding: 0.75rem; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
    .news-summary.markdown-body h3 { margin: 1rem 0 0.5rem; font-size: 1rem; color: var(--text); }
    .news-summary.markdown-body h3:first-child { margin-top: 0; }
    .news-summary.markdown-body ul { margin: 0.35rem 0 0.75rem 1.1rem; padding: 0; }
    .news-summary.markdown-body li { margin-bottom: 0.35rem; }
    .news-summary.markdown-body p { margin: 0 0 0.65rem; }
    .news-summary.markdown-body strong { color: var(--text); }
    .news-source-tag { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .api-error { color: var(--critical); }
    .edit-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 0.5rem;
      max-width: 28rem;
      line-height: 1.35;
    }
    .btn-text {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    .btn-text:hover { color: var(--text); }
    td.editable-wrap { vertical-align: middle; }
    .cell-select, .cell-input {
      width: 100%;
      max-width: 13rem;
      min-width: 7rem;
      padding: 0.3rem 0.45rem;
      font-size: 0.8rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .cell-input { max-width: 22rem; }
    .cell-select:focus, .cell-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    th.col-editable { cursor: default; }
    th.col-editable:hover { color: var(--text-muted); }
    th.col-editable .sort-icon { opacity: 0.35; }
    .tier-legend {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      padding: 0.5rem 1.5rem 0;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .tier-legend .legend-label { font-weight: 600; color: var(--text); margin-right: 0.25rem; }
    .tier-legend .legend-note { margin-left: 0.5rem; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Merchant Success Command Center</h1>
    <div class="stats">
      <span id="stat-rows">—</span> engagements
      <span id="stat-merchants">—</span> merchants
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search merchant, vertical, owner, playbook…" autocomplete="off">
    </div>
    <div class="filters">
      <label>Vertical</label>
      <select id="filter-vertical">
        <option value="">All</option>
      </select>
      <label>Tier</label>
      <select id="filter-tier">
        <option value="">All</option>
        <option value="Tier 0">Tier 0</option>
        <option value="Tier 1">Tier 1</option>
        <option value="Tier 2">Tier 2</option>
      </select>
      <label>Priority</label>
      <select id="filter-priority">
        <option value="">All</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <label>Owner</label>
      <select id="filter-owner">
        <option value="">All</option>
      </select>
      <label>Month</label>
      <select id="filter-month">
        <option value="">All</option>
      </select>
      <span class="edit-hint" title="Edits are stored only in this browser; they are not written to the Google Sheet or server.">
        <strong>Status</strong> &amp; <strong>Next action</strong> are editable (saved locally).
      </span>
      <button type="button" class="btn-text" id="btn-clear-edits">Clear my saved edits</button>
    </div>
  </div>
  <div class="tier-legend" aria-label="Tier color key">
    <span class="legend-label">Tier key</span>
    <span class="tier-pill tier-0">Tier 0</span>
    <span class="tier-pill tier-1">Tier 1</span>
    <span class="tier-pill tier-2">Tier 2</span>
    <span class="legend-note">Row accent matches tier · KPI columns appear when Snowflake data is present</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="thead-row"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">No rows match the current filters.</div>
  </div>
  <div class="modal-backdrop" id="modal-email" role="dialog" aria-label="Generated email">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-email-title">Reach-out email</h2>
        <button type="button" class="modal-close" aria-label="Close" id="modal-email-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-email-body"></div>
    </div>
  </div>
  <div class="modal-backdrop" id="modal-news" role="dialog" aria-label="Latest news">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-news-title">Latest news</h2>
        <button type="button" class="modal-close" aria-label="Close" id="modal-news-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-news-body"></div>
    </div>
  </div>

    }
    function saveOverrides(obj) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) {}
    }
    function mergeStoredOverridesIntoData(rows) {
      const o = loadOverrides();
      rows.forEach((r, i) => {
        const k = rowKey(r);
        if (!o[k]) return;
        if (o[k].status != null) rows[i].status = o[k].status;
        if (o[k].next_action != null) rows[i].next_action = o[k].next_action;
      });
    }
    function patchRowField(merchant, ms, field, value) {
      const i = data.findIndex(r => r.merchant === merchant && r.engagement_month_sort === ms);
      if (i < 0) return;
      data[i][field] = value;
      const o = loadOverrides();
      const k = rowKey(data[i]);
      o[k] = Object.assign({}, o[k], { status: data[i].status, next_action: data[i].next_action });
      saveOverrides(o);
    }
    function statusSelectHtml(r) {
      let cur = (r.status || 'Planned').trim();
      if (!cur) cur = 'Planned';
      let html = '<select class="cell-select" data-m="' + attrEscape(r.merchant) + '" data-ms="' + attrEscape(r.engagement_month_sort) + '" aria-label="Status">';
      if (!STATUS_OPTIONS.includes(cur)) {
        html += '<option value="' + attrEscape(cur) + '" selected>' + escape(cur) + '</option>';
      }
      STATUS_OPTIONS.forEach(o => {
        html += '<option value="' + attrEscape(o) + '"' + (cur === o ? ' selected' : '') + '>' + escape(o) + '</option>';
      });
      html += '</select>';
      return html;
    }
    function nextActionInputHtml(r) {
      return '<input type="text" class="cell-input" data-m="' + attrEscape(r.merchant) + '" data-ms="' + attrEscape(r.engagement_month_sort) + '" value="' + attrEscape(r.next_action) + '" aria-label="Next action" placeholder="Next step…" />';
    }

    function cellHasValue(v) {
      if (v == null) return false;
      const s = String(v).trim();
      if (s === '' || s === '—' || s === '-') return false;
      return true;
    }
    function getVisibleColumns(rows) {
      return TABLE_COLUMNS.filter(col => {
        if (col.isActions) return true;
        if (col.hideIfEmpty) return rows.some(r => cellHasValue(r[col.key]));
        return true;
      });
    }
    function tierDigit(tier) {
      const m = String(tier || '').match(/(\d)/);
      return m ? m[1] : '';
    }
    function tierPillHtml(tier) {
      const d = tierDigit(tier);
      const cls = d ? 'tier-pill tier-' + d : 'tier-pill tier-unknown';
      return '<span class="' + cls + '">' + escape(tier) + '</span>';
    }
    function renderTableHeader(visible) {
      const theadRow = document.getElementById('thead-row');
      theadRow.innerHTML = visible.map(col => {
        if (col.isActions) return '<th class="no-sort">' + escape(col.label) + '</th>';
        const ed = col.editable ? ' class="col-editable" title="Editable in this browser"' : '';
        return '<th data-key="' + col.key + '"' + ed + '>' + escape(col.label) + ' <span class="sort-icon"></span></th>';
      }).join('');
    }
    function updateSortIndicator() {
      document.querySelectorAll('th[data-key]').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
      const headerKey = sortKey === 'engagement_month_sort' ? 'engagement_month_label' : sortKey;
      const th = document.querySelector('th[data-key="' + headerKey + '"]');
      if (th) th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    }
    function renderCellHtml(col, r, idx) {
      if (col.key === 'tier') return '<td>' + tierPillHtml(r.tier) + '</td>';
      if (col.priorityPill) {
        const p = String(r.priority || '');
        const safeClass = p.replace(/[^a-zA-Z0-9_-]/g, '');
        return '<td><span class="priority-pill priority-' + safeClass + '">' + escape(p) + '</span></td>';
      }
      if (col.key === 'status') return '<td class="editable-wrap">' + statusSelectHtml(r) + '</td>';
      if (col.key === 'next_action') return '<td class="editable-wrap">' + nextActionInputHtml(r) + '</td>';
      if (col.key === 'actions') {
        return '<td><div class="btn-row"><button type="button" class="btn-action primary btn-email" data-idx="' + idx + '">Generate email</button><button type="button" class="btn-action btn-news" data-idx="' + idx + '">Latest news</button></div></td>';
      }
      if (col.key === 'leadership_flag') {
        const lf = escape(r.leadership_flag);
        const c = r.leadership_flag === 'Yes' ? 'leadership-yes' : '';
        return '<td class="' + c + '">' + lf + '</td>';
      }
      return '<td>' + escape(r[col.key]) + '</td>';
    }

    let data = RAW.slice();
    mergeStoredOverridesIntoData(data);
    let sortKey = 'engagement_month_sort';
    let sortDir = 1;
    let currentRows = [];

    const tbody = document.getElementById('tbody');
    const emptyState = document.getElementById('empty-state');
    const statRows = document.getElementById('stat-rows');
    const statMerchants = document.getElementById('stat-merchants');

    async function loadData() {
      try {
        const r = await fetch(apiUrl('/api/data'));
        if (r.ok) {
          const d = await r.json();
          if (Array.isArray(d) && d.length) {
          RAW = d;
          data = RAW.slice();
          mergeStoredOverridesIntoData(data);
          visibleColumnKeys = '';
        }
        }
      } catch (e) {}
    }

    function unique(arr) { return [...new Set(arr)].filter(Boolean).sort(); }
    function fillSelect(id, values, current) {
      const sel = document.getElementById(id);
      const first = sel.options[0];
      sel.innerHTML = '';
      sel.appendChild(first);
      values.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        if (v === current) o.selected = true;
        sel.appendChild(o);
      });
    }

    function getFilters() {
      return {
        q: document.getElementById('search').value.trim().toLowerCase(),
        vertical: document.getElementById('filter-vertical').value,
        tier: document.getElementById('filter-tier').value,
        priority: document.getElementById('filter-priority').value,
        owner: document.getElementById('filter-owner').value,
        month: document.getElementById('filter-month').value
      };
    }

    function filterRows(rows) {
      const f = getFilters();
      return rows.filter(r => {
        if (f.vertical && r.vertical !== f.vertical) return false;
        if (f.tier && r.tier !== f.tier) return false;
        if (f.priority && r.priority !== f.priority) return false;
        if (f.owner && r.owner !== f.owner) return false;
        if (f.month && r.engagement_month_label !== f.month) return false;
        if (f.q) {
          const s = [r.merchant, r.legal_entity, r.vertical, r.owner, r.fy26_fc_gmv, r.playbook, r.next_action, r.num_applications, r.approval_rate, r.take_rate, r.loans, r.aov].join(' ').toLowerCase();
          if (!s.includes(f.q)) return false;
        }
        return true;
      });
    }

    function render() {
      const filtered = filterRows(data);
      const sorted = filtered.slice().sort((a, b) => {
        let aVal = a[sortKey] ?? a.engagement_month_sort ?? '';
        let bVal = b[sortKey] ?? b.engagement_month_sort ?? '';
        if (aVal < bVal) return -sortDir;
        if (aVal > bVal) return sortDir;
        return 0;
      });

      const visible = getVisibleColumns(data);
      const keyStr = visible.map(c => c.key).join(',');
      if (keyStr !== visibleColumnKeys) {
        visibleColumnKeys = keyStr;
        renderTableHeader(visible);
      }

      tbody.innerHTML = '';
      if (sorted.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      const merchants = unique(sorted.map(r => r.merchant));
      statRows.textContent = sorted.length;
      statMerchants.textContent = merchants.length;
      currentRows = sorted;

      sorted.forEach((r, idx) => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-tier', tierDigit(r.tier));
        tr.innerHTML = visible.map(col => renderCellHtml(col, r, idx)).join('');
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll('.btn-email').forEach(btn => btn.addEventListener('click', onGenerateEmail));
      tbody.querySelectorAll('.btn-news').forEach(btn => btn.addEventListener('click', onLatestNews));
      bindEditableCells();
      updateSortIndicator();
    }

    function bindEditableCells() {
      if (tbody._csccEditBound) return;
      tbody._csccEditBound = true;
      tbody.addEventListener('change', (e) => {
        const t = e.target;
        if (!t.classList || !t.classList.contains('cell-select')) return;
        patchRowField(t.getAttribute('data-m'), t.getAttribute('data-ms'), 'status', t.value);
      });
      tbody.addEventListener('blur', (e) => {
        const t = e.target;
        if (!t.classList || !t.classList.contains('cell-input')) return;
        patchRowField(t.getAttribute('data-m'), t.getAttribute('data-ms'), 'next_action', t.value);
      }, true);
    }

    function escape(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    const API_BASE = (typeof window !== 'undefined' && window.location && window.location.origin) ? '' : '';
    function apiUrl(path) { return API_BASE + path; }

    function openEmailModal(title, bodyHtml) {
      document.getElementById('modal-email-title').textContent = title;
      document.getElementById('modal-email-body').innerHTML = bodyHtml;
      document.getElementById('modal-email').classList.add('open');
    }
    function openNewsModal(title, bodyHtml) {
      document.getElementById('modal-news-title').textContent = title;
      document.getElementById('modal-news-body').innerHTML = bodyHtml;
      document.getElementById('modal-news').classList.add('open');
    }
    function closeEmailModal() { document.getElementById('modal-email').classList.remove('open'); }
    function closeNewsModal() { document.getElementById('modal-news').classList.remove('open'); }
    document.getElementById('modal-email-close').addEventListener('click', closeEmailModal);
    document.getElementById('modal-news-close').addEventListener('click', closeNewsModal);
    document.getElementById('modal-email').addEventListener('click', e => { if (e.target.id === 'modal-email') closeEmailModal(); });
    document.getElementById('modal-news').addEventListener('click', e => { if (e.target.id === 'modal-news') closeNewsModal(); });

    async function onGenerateEmail(ev) {
      const idx = parseInt(ev.target.getAttribute('data-idx'), 10);
      const row = currentRows[idx];
      if (!row) return;
      const btn = ev.target;
      btn.disabled = true;
      btn.textContent = 'Generating…';
      const body = document.getElementById('modal-email-body');
      openEmailModal('Reach-out email – ' + escape(row.merchant), '<div class="modal-body loading">Calling API…</div>');
      const bodyEl = document.getElementById('modal-email-body');
      try {
        const res = await fetch(apiUrl('/api/generate-email'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(row)
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          bodyEl.innerHTML = '<p class="api-error">' + escape(data.error || 'Request failed') + '</p>';
          return;
        }
        const email = data.email || '';
        bodyEl.innerHTML = '<div class="email-body">' + escape(email) + '</div><button type="button" class="btn-copy" id="btn-copy-email">Copy to clipboard</button>';
        document.getElementById('btn-copy-email').addEventListener('click', () => {
          navigator.clipboard.writeText(email);
          const b = document.getElementById('btn-copy-email');
          b.textContent = 'Copied!';
          setTimeout(() => b.textContent = 'Copy to clipboard', 2000);
        });
      } catch (e) {
        bodyEl.innerHTML = '<p class="api-error">' + escape(e.message || 'Network error. Run the Flask server for AI features.') + '</p>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate email';
      }
    }

    async function onLatestNews(ev) {
      const idx = parseInt(ev.target.getAttribute('data-idx'), 10);
      const row = currentRows[idx];
      if (!row) return;
      const merchant = row.merchant;
      const btn = ev.target;
      btn.disabled = true;
      btn.textContent = 'Loading…';
      openNewsModal('Latest news – ' + merchant, '<div class="modal-body loading">Fetching news…</div>');
      const body = document.getElementById('modal-news-body');
      try {
        const params = new URLSearchParams({ merchant });
        const le = (row.legal_entity && String(row.legal_entity).trim()) ? String(row.legal_entity).trim() : '';
        if (le) params.set('legal_entity', le);
        const res = await fetch(apiUrl('/api/news?' + params.toString()));
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          body.innerHTML = '<p class="api-error">' + escape(data.error || 'Request failed') + '</p>';
          btn.disabled = false;
          btn.textContent = 'Latest news';
          return;
        }
        const articles = data.articles || [];
        const summary = data.summary || '';
        const src = data.source || '';
        if (articles.length === 0 && !summary) {
          body.innerHTML = '<p class="text-muted">No recent news returned. Set GEMINI_API_KEY (live web), or SERPER_API_KEY / NEWS_API_KEY, in your server environment. OpenAI alone does not browse current news.</p>';
          btn.disabled = false;
          btn.textContent = 'Latest news';
          return;
        }
        let html = '';
        if (src) {
          const labels = { gemini: 'Gemini + Google Search (live web)', serper: 'Serper (Google News)', newsapi: 'News API', openai: 'OpenAI Responses API + web search (live)' };
          html += '<p class="news-source-tag">' + escape(labels[src] || src) + '</p>';
        }
        if (summary) {
          const useMd = (typeof marked !== 'undefined' && (summary.indexOf('###') >= 0 || summary.indexOf('**') >= 0));
          const inner = useMd ? marked.parse(summary) : '<p>' + escape(summary).replace(/\n/g, '<br>') + '</p>';
          html += '<div class="news-summary markdown-body">' + inner + '</div>';
        }
        if (articles.length) html += '<ul class="news-list">' + articles.map(a => '<li><a href="' + escape(a.url) + '" target="_blank" rel="noopener">' + escape(a.title) + '</a><div class="source">' + escape(a.source) + (a.published ? ' · ' + escape(a.published.slice(0,10)) : '') + '</div></li>').join('') + '</ul>';
        body.innerHTML = html || '<p class="text-muted">No sources returned.</p>';
        btn.disabled = false;
        btn.textContent = 'Latest news';
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Latest news';
        body.innerHTML = '<p class="api-error">' + escape(e.message || 'Network error. Run the Flask server for AI features.') + '</p>';
      }
    }

    document.getElementById('btn-clear-edits').addEventListener('click', () => {
      if (!confirm('Clear all saved Status and Next action values for this browser?')) return;
      try { localStorage.removeItem(LS_KEY); } catch (e) {}
      data = RAW.slice();
      visibleColumnKeys = '';
      render();
    });

    (async function() {
      await loadData();

      document.getElementById('thead-row').addEventListener('click', (e) => {
        const th = e.target.closest('th[data-key]');
        if (!th) return;
        const key = th.getAttribute('data-key');
        const sortCol = key === 'engagement_month_label' ? 'engagement_month_sort' : key;
        if (sortKey === sortCol) sortDir = -sortDir;
        else { sortKey = sortCol; sortDir = 1; }
        render();
      });

      document.getElementById('search').addEventListener('input', render);
      document.getElementById('filter-vertical').addEventListener('change', render);
      document.getElementById('filter-tier').addEventListener('change', render);
      document.getElementById('filter-priority').addEventListener('change', render);
      document.getElementById('filter-owner').addEventListener('change', render);
      document.getElementById('filter-month').addEventListener('change', render);

      fillSelect('filter-vertical', unique(RAW.map(r => r.vertical)));
      fillSelect('filter-owner', unique(RAW.map(r => r.owner)));
      fillSelect('filter-month', unique(RAW.map(r => r.engagement_month_label)));

      render();
    })();
  </script>
</body>
</html>
